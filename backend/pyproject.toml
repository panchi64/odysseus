[project]
name = "odysseus-backend"
version = "0.1.0"
description = "Odysseus backend — the chassis around a Pydantic AI engine."
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "pydantic-ai>=0.2",
    "sqlmodel>=0.0.22",
    "cryptography>=44",
    "argon2-cffi>=23",
    "alembic>=1.18.4",
    "numpy>=2.4.6",
    "openai>=2.41.0",
    "websockets>=16.0",
    # Web fetch: main-content extraction with native Markdown output
    # (output_format="markdown"). Pulls lxml transitively.
    "trafilatura>=2.0",
]

# Whole-DB SQLCipher was ruled out (no portable 3.14 wheels); at-rest
# encryption is application-layer AEAD instead (see docs decision D17).
# Alembic migrations are wired (auto-upgrade on startup); sqlite-vec lands later.

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "ruff>=0.8",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py314"
# Autogenerated Alembic revisions — long create_index lines, boilerplate imports.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
testpaths = ["tests"]
